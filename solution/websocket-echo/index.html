<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>WebSocket-Echo (Vorher-Beispiel)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 40px auto; }
    #log { background: #111; color: #0f0; padding: 12px; height: 260px; overflow-y: auto; font-family: monospace; }
    input, button { font-size: 16px; padding: 6px; }
  </style>
</head>
<body>
  <h1>WebSocket-Echo &ndash; das "Vorher" der Migration</h1>
  <p>Status: <span id="status">nicht verbunden</span></p>
  <input id="message" placeholder="Nachricht eingeben..." />
  <button id="send">Senden</button>
  <div id="log"></div>

  <script type="module">
    // Classic WebSocket client. Compare with exercise1-streams.js (WebTransport).
    const statusEl = document.getElementById("status");
    const logEl = document.getElementById("log");
    const messageInput = document.getElementById("message");
    const sendButton = document.getElementById("send");

    function log(text) {
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 1) connect: ws:// , single socket object
    const socket = new WebSocket("ws://localhost:8090");

    socket.addEventListener("open", () => {
      statusEl.textContent = "verbunden";
      log("Verbindung steht.");
    });

    // 2) receive: event-based (onmessage), no reader loop
    socket.addEventListener("message", (event) => {
      log("<- " + event.data);
    });

    socket.addEventListener("close", () => {
      statusEl.textContent = "getrennt";
      log("Verbindung geschlossen.");
    });

    // 3) send: socket.send() with a string, no writer/encoder
    function sendMessage() {
      const text = messageInput.value;
      if (!text) return;
      log("-> " + text);
      socket.send(text);
      messageInput.value = "";
    }

    sendButton.addEventListener("click", sendMessage);
    messageInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
